<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <title>Word World Tokyo 2026</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #182033;
      --muted: #667085;
      --line: #e5e7eb;
      --accent: #2563eb;
      --danger: #dc2626;
      --ok: #16a34a;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }
    header {
      padding: 22px 18px;
      background: linear-gradient(135deg, #1d4ed8, #0f172a);
      color: white;
    }
    header h1 { margin: 0; font-size: 26px; }
    header p { margin: 6px 0 0; opacity: .9; }
    main { max-width: 980px; margin: 0 auto; padding: 18px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15,23,42,.06);
      margin-bottom: 14px;
    }
    .stat .label { color: var(--muted); font-size: 13px; }
    .stat .value { font-size: 28px; font-weight: 800; }
    .wordbox {
      text-align: center;
      padding: 28px 16px;
    }
    #word { font-size: 46px; font-weight: 850; letter-spacing: .02em; }
    #meaning { margin-top: 8px; font-size: 20px; color: var(--muted); }
    button, select, input {
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 11px 13px;
    }
    button {
      border: 0;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
      margin: 4px;
    }
    button.secondary { background: #eef2ff; color: #1e3a8a; }
    button.ok { background: var(--ok); }
    button.ng { background: var(--danger); }
    button.warn { background: var(--warn); color: #111827; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 18px; }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .filters input { flex: 1; min-width: 180px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 700; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #1e3a8a; font-size: 12px; }
    .small { color: var(--muted); font-size: 13px; }
    .bar { height: 10px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .bar > div { height: 100%; background: var(--accent); }
    @media (max-width: 760px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      #word { font-size: 36px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Word World Tokyo 2026</h1>
    <p>学習ログJSONを反映した英単語レビュー画面</p>
  </header>

  <main>
    <section class="grid">
      <div class="card stat"><div class="label">回答数</div><div class="value" id="totalStat">354</div></div>
      <div class="card stat"><div class="label">Known</div><div class="value" id="knownStat">281</div></div>
      <div class="card stat"><div class="label">Unknown</div><div class="value" id="unknownStat">67</div></div>
      <div class="card stat"><div class="label">平均反応</div><div class="value" id="rtStat">1.5s</div></div>
    </section>

    <section class="card wordbox">
      <div class="small">弱点優先レビュー</div>
      <div id="word">loading</div>
      <div id="meaning">...</div>
      <div class="controls">
        <button onclick="nextWeak()">次の弱点</button>
        <button class="secondary" onclick="randomWord()">ランダム</button>
        <button class="secondary" onclick="speakWord()">発音</button>
        <button class="ok" onclick="markLocal('known')">覚えた</button>
        <button class="ng" onclick="markLocal('unknown')">まだ</button>
      </div>
      <p class="small">※「覚えた/まだ」はこの端末のブラウザ内だけに保存します。</p>
    </section>

    <section class="card">
      <h2>弱点候補 Top 30</h2>
      <div class="filters">
        <input id="search" placeholder="単語・意味で検索" oninput="renderTable()" />
        <select id="mode" onchange="renderTable()">
          <option value="weak">弱点順</option>
          <option value="all">全単語</option>
          <option value="unknown">Unknown/Timeoutのみ</option>
        </select>
      </div>
      <div style="overflow:auto">
        <table>
          <thead>
            <tr>
              <th>単語</th>
              <th>意味</th>
              <th>結果</th>
              <th>平均反応</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>使い方</h2>
      <p>このファイルをGitHubの <b>index.html</b> としてアップロードすると、GitHub Pagesでそのまま表示できます。</p>
      <p class="small">元データ: cles_data_2026-05-10.json / attempts 354件</p>
    </section>
  </main>

    const attempts = DATA.attempts || [];
    const words = DATA.words || [];
    const byWord = new Map();

    for (const a of attempts) {
      const id = a.word_id ?? a.word;
      if (!byWord.has(id)) byWord.set(id, {
        word: a.word || "",
        meaning: a.meaning || "",
        known: 0,
        unknown: 0,
        timeout: 0,
        count: 0,
        reaction: []
      });
      const r = byWord.get(id);
      r.count++;
      if (a.result === "known") r.known++;
      if (a.result === "unknown") r.unknown++;
      if (a.result === "timeout") r.timeout++;
      if (a.reaction_ms > 0) r.reaction.push(a.reaction_ms);
    }

    const allRows = Array.from(byWord.values()).map(r => {
      r.avg = r.reaction.length ? Math.round(r.reaction.reduce((a,b)=>a+b,0)/r.reaction.length) : 0;
      r.weakScore = r.unknown * 2 + r.timeout * 3 + r.avg / 1000;
      return r;
    }).sort((a,b) => b.weakScore - a.weakScore);

    let reviewRows = allRows.filter(r => r.unknown || r.timeout);
    if (!reviewRows.length) reviewRows = allRows;
    let current = 0;

    function show(row) {
      document.getElementById("word").textContent = row.word;
      document.getElementById("meaning").textContent = row.meaning;
    }

    function nextWeak() {
      current = (current + 1) % reviewRows.length;
      show(reviewRows[current]);
    }

    function randomWord() {
      const row = allRows[Math.floor(Math.random() * allRows.length)];
      show(row);
    }

    function speakWord() {
      const text = document.getElementById("word").textContent;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 0.82;
      speechSynthesis.speak(u);
    }

    function markLocal(result) {
      const word = document.getElementById("word").textContent;
      const logs = JSON.parse(localStorage.getItem("wordWorldLocalLogs") || "[]");
      logs.push({ word, result, at: new Date().toISOString() });
      localStorage.setItem("wordWorldLocalLogs", JSON.stringify(logs));
      nextWeak();
    }

    function renderTable() {
      const q = document.getElementById("search").value.toLowerCase();
      const mode = document.getElementById("mode").value;
      let rows = mode === "weak" ? allRows.slice(0, 30) : allRows;
      if (mode === "unknown") rows = allRows.filter(r => r.unknown || r.timeout);
      rows = rows.filter(r => (r.word + " " + r.meaning).toLowerCase().includes(q));

      document.getElementById("tbody").innerHTML = rows.map(r => {
        const total = Math.max(1, r.count);
        const knownRate = Math.round(r.known / total * 100);
        return `<tr>
          <td><b>${escapeHtml(r.word)}</b></td>
          <td>${escapeHtml(r.meaning)}</td>
          <td>
            <span class="pill">K ${r.known}</span>
            <span class="pill">U ${r.unknown}</span>
            <span class="pill">T ${r.timeout}</span>
            <div class="bar"><div style="width:${knownRate}%"></div></div>
          </td>
          <td>${r.avg ? (r.avg/1000).toFixed(1) + "s" : "-"}</td>
        </tr>`;
      }).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    show(reviewRows[0] || allRows[0] || {word:"no data", meaning:""});
    renderTable();
  </script>
